name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e . ruff

      - name: Ruff lint
        run: ruff check superweb2pdf/

      - name: Ruff format check
        run: ruff format --check superweb2pdf/

  test:
    name: 测试 (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Import check
        run: |
          python -c "
          import superweb2pdf
          print(f'version: {superweb2pdf.__version__}')
          from superweb2pdf.core import splitter, image_utils, pdf_builder
          from superweb2pdf.capture import file_input
          print('All core modules OK')
          "

      - name: CLI smoke test
        run: |
          superweb2pdf --help

      - name: Smart split integration test
        run: |
          python -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (800, 4000), 'white')
          d = ImageDraw.Draw(img)
          for i in range(5):
              y = i * 800
              d.rectangle([50, y+50, 750, y+700], fill='#336699')
          img.save('/tmp/test_screenshot.png')
          "
          superweb2pdf --image /tmp/test_screenshot.png -o /tmp/test_output.pdf -v
          python -c "
          import os
          size = os.path.getsize('/tmp/test_output.pdf')
          assert size > 1000, f'PDF too small: {size} bytes'
          print(f'PDF generated: {size} bytes ✅')
          "

      - name: Run unit tests
        run: |
          pip install pytest pytest-asyncio
          pytest tests/ -v --tb=short --ignore=tests/test_souwen_plugin.py

  souwen-plugin-test:
    name: SouWen 插件集成测试
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install with SouWen integration
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[souwen]"
          pip install pytest pytest-asyncio

      - name: Run SouWen plugin tests
        run: pytest tests/test_souwen_plugin.py -v --tb=short

      - name: Verify entry point registration
        run: |
          python -c "
          from importlib.metadata import entry_points
          eps = [ep for ep in entry_points(group='souwen.plugins') if ep.name == 'superweb2pdf']
          assert eps, 'superweb2pdf entry point not found'
          factory = eps[0].load()
          assert callable(factory), 'entry point should be a factory function'
          plugin = factory()
          print(f'Entry point loaded: {plugin}')
          print(f'Plugin name: {plugin.name}')
          print(f'Plugin domain: {plugin.domain}')
          "

  build:
    name: 构建检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
