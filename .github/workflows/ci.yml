name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e . ruff

      - name: Ruff lint (source)
        run: ruff check superweb2pdf/

      - name: Ruff lint (tests)
        run: ruff check tests/ --ignore=E501

      - name: Ruff format check (source)
        run: ruff format --check superweb2pdf/

      - name: Ruff format check (tests)
        run: ruff format --check tests/

  test:
    name: 测试 (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Import check
        run: |
          python -c "
          import superweb2pdf
          print(f'version: {superweb2pdf.__version__}')
          from superweb2pdf.core import splitter, image_utils, pdf_builder
          from superweb2pdf.capture import file_input
          print('All core modules OK')
          "

      - name: High-level API import check
        run: |
          python -c "
          from superweb2pdf import (
              convert, convert_image, convert_url, convert_pil,
              WebToPdfOptions, CaptureOptions, SplitOptions, PdfOptions,
              ConversionResult, PageInfo,
              SuperWeb2PDFError, CaptureError, RenderError, ConfigurationError,
              list_capture_backends,
          )
          print('High-level API imports OK')
          backends = list_capture_backends()
          print(f'Registered backends: {[b.name for b in backends]}')
          "

      - name: CLI smoke test
        run: |
          superweb2pdf --help
          superweb2pdf --version

      - name: Smart split integration test
        run: |
          python -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (800, 4000), 'white')
          d = ImageDraw.Draw(img)
          for i in range(5):
              y = i * 800
              d.rectangle([50, y+50, 750, y+700], fill='#336699')
          img.save('/tmp/test_screenshot.png')
          "
          superweb2pdf --image /tmp/test_screenshot.png -o /tmp/test_output.pdf -v
          python -c "
          import os
          size = os.path.getsize('/tmp/test_output.pdf')
          assert size > 1000, f'PDF too small: {size} bytes'
          print(f'PDF generated: {size} bytes ✅')
          "

      - name: High-level API integration test
        run: |
          python -c "
          from PIL import Image, ImageDraw
          from io import BytesIO
          from superweb2pdf import convert, WebToPdfOptions

          # Test 1: PIL Image → BytesIO (in-memory)
          img = Image.new('RGB', (800, 2400), 'lightblue')
          buf = BytesIO()
          result = convert(img, buf, options=WebToPdfOptions.simple())
          assert result.ok, 'Conversion failed'
          assert result.page_count >= 2, f'Expected ≥2 pages, got {result.page_count}'
          assert result.file_size_bytes and result.file_size_bytes > 0
          print(f'Test 1 ✅ PIL→BytesIO: {result.page_count} pages, {result.file_size_bytes} bytes')

          # Test 2: File → File with options
          img2 = Image.new('RGB', (800, 3000), 'white')
          d = ImageDraw.Draw(img2)
          for i in range(4):
              y = i * 750
              d.rectangle([100, y+100, 700, y+650], fill='steelblue')
          img2.save('/tmp/api_test.png')
          opts = WebToPdfOptions.simple(paper='letter', dpi=200, split='smart')
          result2 = convert('/tmp/api_test.png', '/tmp/api_test.pdf', options=opts)
          assert result2.ok
          assert result2.backend == 'file'
          print(f'Test 2 ✅ File→File: {result2.page_count} pages, backend={result2.backend}')

          # Test 3: split=none gives 1 page
          buf3 = BytesIO()
          opts3 = WebToPdfOptions.simple(split='none')
          result3 = convert(img, buf3, options=opts3)
          assert result3.page_count == 1, f'Expected 1 page with split=none, got {result3.page_count}'
          print(f'Test 3 ✅ split=none: {result3.page_count} page')

          # Test 4: Progress callback fires
          events = []
          def on_progress(evt):
              events.append(evt.stage)
          buf4 = BytesIO()
          convert(img, buf4, progress=on_progress)
          assert 'done' in events, f'Expected done event, got {events}'
          print(f'Test 4 ✅ Progress events: {events}')

          # Test 5: Serialization roundtrip
          import json
          data = result.to_dict()
          json_str = json.dumps(data)
          assert 'page_count' in json_str
          print(f'Test 5 ✅ JSON serialization OK ({len(json_str)} chars)')

          print('All API integration tests passed ✅')
          "

      - name: Run unit tests
        run: |
          pip install pytest pytest-asyncio
          pytest tests/ -v --tb=short --ignore=tests/test_souwen_plugin.py

  test-coverage:
    name: 测试覆盖率
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_souwen_plugin.py \
            --cov=superweb2pdf \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=45

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  souwen-plugin-test:
    name: SouWen 插件集成测试
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install with SouWen integration
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio
          # Install souwen from git (not on PyPI yet)
          pip install "souwen @ git+https://github.com/BlueSkyXN/SouWen.git@main" || echo "::warning::souwen install from git failed, plugin tests may be limited"

      - name: Run SouWen plugin tests
        run: pytest tests/test_souwen_plugin.py -v --tb=short

      - name: Verify entry point registration
        run: |
          python -c "
          from importlib.metadata import entry_points
          eps = [ep for ep in entry_points(group='souwen.plugins') if ep.name == 'superweb2pdf']
          assert eps, 'superweb2pdf entry point not found'
          factory = eps[0].load()
          assert callable(factory), 'entry point should be a factory function'
          plugin = factory()
          print(f'Entry point loaded: {plugin}')
          print(f'Plugin name: {plugin.name}')
          print(f'Plugin domain: {plugin.domain}')
          "

  build:
    name: 构建检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package contents
        run: |
          pip install dist/*.whl
          python -c "
          import superweb2pdf
          print(f'Installed version: {superweb2pdf.__version__}')
          from superweb2pdf import convert, WebToPdfOptions
          print('Package install verification OK ✅')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
