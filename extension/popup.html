<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #00d4ff;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    button {
      display: block;
      width: 100%;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #captureFullPage {
      background: #00d4ff;
      color: #1a1a2e;
      font-size: 14px;
      padding: 12px;
      margin-bottom: 8px;
    }
    #captureVisible {
      background: #2a2a4a;
      color: #b0b0b0;
      font-size: 12px;
      padding: 9px;
      margin-bottom: 14px;
      border: 1px solid #3a3a5a;
    }
    #status {
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 10px;
      min-height: 48px;
      font-size: 11px;
      color: #808080;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #status.error { color: #ff6b6b; }
    #status.success { color: #51cf66; }
    .warn {
      font-size: 10px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>SuperWeb2PDF Capture</h1>
  <button id="captureFullPage">Capture Full Page</button>
  <button id="captureVisible">Capture Visible Only</button>
  <div id="status">Ready.</div>
  <div class="warn">⚠ Keep this popup open during capture</div>
  <script src="popup.js"></script>
</body>
</html>
