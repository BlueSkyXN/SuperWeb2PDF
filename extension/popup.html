<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #00d4ff;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    button {
      display: block;
      width: 100%;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    button:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }
    #captureFullPage {
      background: #00d4ff;
      color: #1a1a2e;
      font-size: 14px;
      padding: 12px;
      margin-bottom: 8px;
    }
    #captureVisible {
      background: #2a2a4a;
      color: #b0b0b0;
      font-size: 12px;
      padding: 9px;
      margin-bottom: 14px;
      border: 1px solid #3a3a5a;
    }
    #status {
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 10px;
      min-height: 48px;
      font-size: 11px;
      color: #808080;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #status.error { color: #ff6b6b; }
    #status.success { color: #51cf66; }
    .progress {
      width: 100%;
      height: 8px;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 4px;
    }
    #progressBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #51cf66);
      transition: width 0.2s ease;
    }
    #progressText {
      min-height: 16px;
      color: #a8dff0;
      font-size: 10px;
      margin-bottom: 8px;
      text-align: right;
    }
    [hidden] { display: none !important; }
    .warn {
      background: #392b00;
      border: 1px solid #ffd43b;
      border-radius: 4px;
      color: #ffd43b;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.4;
      padding: 8px;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>SuperWeb2PDF Capture</h1>
  <button id="captureFullPage" aria-label="Capture the entire current web page">Capture Full Page</button>
  <button id="captureVisible" aria-label="Capture only the visible area of the current tab">Capture Visible Only</button>
  <div
    id="progressWrap"
    class="progress"
    role="progressbar"
    aria-label="Capture progress"
    aria-valuemin="0"
    aria-valuemax="100"
    aria-valuenow="0"
    hidden
  >
    <div id="progressBar"></div>
  </div>
  <div id="progressText" aria-live="polite" hidden></div>
  <div id="status" role="status" aria-live="polite">Ready.</div>
  <div class="warn" role="alert">⚠ Keep this popup open during full-page capture. Closing it will stop the process.</div>
  <script src="popup.js"></script>
</body>
</html>
